name: analyze-pr-comment

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  post-comment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read pnpm version from packageManager
        shell: bash
        run: |
          PM=$(node -e "console.log(require(process.env.GITHUB_WORKSPACE + '/package.json').packageManager)")
          if [[ -z "$PM" || "$PM" != pnpm@* ]]; then
            echo "Invalid or missing packageManager in package.json (expected pnpm@...). Got: '$PM'"
            exit 1
          fi
          PM_VERSION=${PM#pnpm@}
          echo "PM_VERSION=$PM_VERSION" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm config set fetch-retries 5
          pnpm config set fetch-retry-factor 2
          pnpm config set fetch-retry-mintimeout 10000
          pnpm config set fetch-retry-maxtimeout 60000
          pnpm config set network-timeout 120000
          pnpm config set registry https://registry.npmjs.org/
          pnpm install --config.optional=true --frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r build

      - name: Generate Playbook analyze-pr outputs
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          node packages/cli/dist/main.js index --json
          node -e "const fs=require('node:fs'); const cp=require('node:child_process'); const out=cp.execFileSync('node',['packages/cli/dist/main.js','analyze-pr','--base','origin/${{ github.base_ref }}','--format','github-comment'],{encoding:'utf8'}); fs.mkdirSync('.playbook',{recursive:true}); fs.writeFileSync('.playbook/analyze-pr-comment.md', out, 'utf8');"
          node -e "const fs=require('node:fs'); const cp=require('node:child_process'); const out=cp.execFileSync('node',['packages/cli/dist/main.js','analyze-pr','--base','origin/${{ github.base_ref }}','--format','github-review'],{encoding:'utf8'}); fs.mkdirSync('.playbook',{recursive:true}); fs.writeFileSync('.playbook/analyze-pr-review.json', out, 'utf8');"

      - name: Post sticky Playbook PR comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          PLAYBOOK_COMMENT_MARKER: "<!-- playbook:analyze-pr-comment -->"
          PLAYBOOK_COMMENT_FILE: ".playbook/analyze-pr-comment.md"
        with:
          script: |
            const fs = require('node:fs');
            const { upsertStickyPrComment } = require('./.github/scripts/upsert-sticky-pr-comment.cjs');
            const { callGitHubWithRetry, isTransientGitHubError } = require('./.github/scripts/sync-analyze-pr-review-comments.cjs');
            const marker = process.env.PLAYBOOK_COMMENT_MARKER;
            const commentPath = process.env.PLAYBOOK_COMMENT_FILE;
            const formattedComment = fs.readFileSync(commentPath, 'utf8').trimEnd();
            const body = `${marker}\n${formattedComment}`;
            const { owner, repo } = context.repo;
            const pullNumber = context.issue.number;
            try {
              const result = await callGitHubWithRetry({
                core,
                endpoint: 'issues.upsertStickyPrComment',
                prNumber: pullNumber,
                operation: () => upsertStickyPrComment({
                  github,
                  owner,
                  repo,
                  issue_number: pullNumber,
                  marker,
                  body,
                }),
              });
              core.info(JSON.stringify({
                event: 'playbook.sidecar.comment.sync',
                endpoint: 'issues.upsertStickyPrComment',
                pr_number: pullNumber,
                action: result.action,
                comment_id: result.id,
              }));
            } catch (error) {
              if (isTransientGitHubError(error)) {
                core.warning(`Playbook sticky PR comment degraded after transient GitHub API failures (pr=${pullNumber}). Skipping sidecar comment sync.`);
                return;
              }
              throw error;
            }

      - name: Sync inline Playbook diagnostics
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          PLAYBOOK_REVIEW_FILE: ".playbook/analyze-pr-review.json"
          PLAYBOOK_REVIEW_MARKER: "<!-- playbook:analyze-pr-inline -->"
          PLAYBOOK_REVIEW_FALLBACK_MARKER: "<!-- playbook:analyze-pr-inline-fallback -->"
        with:
          script: |
            const fs = require('node:fs');
            const { runSyncAnalyzePrReviewCommentsSidecar } = require('./.github/scripts/sync-analyze-pr-review-comments.cjs');
            const diagnostics = JSON.parse(fs.readFileSync(process.env.PLAYBOOK_REVIEW_FILE, 'utf8'));
            const expectedHeadSha = context.payload.pull_request?.head?.sha;
            if (!expectedHeadSha) {
              core.warning('Missing pull request head SHA for review diagnostics transport; degrading Playbook inline diagnostics to fallback comment behavior.');
            }

            await runSyncAnalyzePrReviewCommentsSidecar({
              github,
              core,
              context,
              diagnostics,
              marker: process.env.PLAYBOOK_REVIEW_MARKER,
              fallbackMarker: process.env.PLAYBOOK_REVIEW_FALLBACK_MARKER,
              expectedHeadSha,
            });

      - name: Skip sticky comment for fork pull requests
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Skipping analyze-pr sticky comment: pull_request originates from a fork and may not have pull-requests:write permission."
