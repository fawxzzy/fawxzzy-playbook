name: ci

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Playbook CI composite action
        uses: ./.github/actions/playbook-ci
        with:
          node-version: "22"
          working-directory: "."

  demo-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Playbook CI composite action
        uses: ./.github/actions/playbook-ci
        with:
          node-version: "22"
          working-directory: "."

      - name: Validate playbook-demo compatibility
        run: node scripts/demo-validate.mjs
