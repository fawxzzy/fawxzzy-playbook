name: Playbook Architecture Diagrams

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'playbook.config.json'
      - '.github/workflows/playbook-diagrams.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Activate pnpm from packageManager
        shell: bash
        run: |
          PM=$(node -e "console.log(require(process.env.GITHUB_WORKSPACE + '/package.json').packageManager)")
          corepack enable
          corepack prepare "$PM" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Playbook diagrams
        run: npx playbook diagram --repo . --out docs/ARCHITECTURE_DIAGRAMS.md

      - name: Commit diagram updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update architecture diagrams"
          file_pattern: docs/ARCHITECTURE_DIAGRAMS.md
