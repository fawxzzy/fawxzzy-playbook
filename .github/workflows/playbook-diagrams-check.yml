name: Playbook Diagrams Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Verify pnpm version
        run: pnpm -v

      - name: Force npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Force pnpm registry
        run: pnpm config set registry https://registry.npmjs.org/

      - name: Assert install environment
        run: node scripts/assert-install-env.mjs

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Regenerate diagrams
        run: pnpm playbook:diagram

      - name: Verify diagrams are committed
        run: git diff --exit-code docs/ARCHITECTURE_DIAGRAMS.md
