name: playbook
archetype: node-web
repo: https://github.com/fawxzzy/playbook
branch: main
installCommand: pnpm install
buildCommand: pnpm -r build
startCommand: pnpm start:lifeline
port: 4300
healthcheckPath: /healthz

env:
  mode: inline
  requiredKeys:
    - PATH

deploy:
  strategy: rebuild
  workingDirectory: .
