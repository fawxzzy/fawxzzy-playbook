name: Playbook CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace packages
        run: pnpm -r build

      - name: Run tests
        run: pnpm -r test

      - name: Run Playbook verify
        run: node packages/cli/dist/main.js verify --ci
