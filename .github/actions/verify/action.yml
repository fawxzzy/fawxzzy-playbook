name: Playbook Verify
description: Run Playbook verification from checked-out repository source.

inputs:
  playbook_version:
    description: Deprecated (reserved for future published-package support). Ignored in repo-local mode.
    required: false
    default: "latest"
  args:
    description: Additional arguments to pass to `playbook verify`.
    required: false
    default: "--ci"
  node_version:
    description: Node.js version to use.
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup pnpm via Corepack
      shell: bash
      run: |
        PM="$(node -p "require(process.env.GITHUB_WORKSPACE + '/package.json').packageManager")"
        if [[ -z "$PM" || "$PM" != pnpm@* ]]; then
          echo "Invalid or missing packageManager in package.json (expected pnpm@...). Got: '$PM'"
          exit 1
        fi
        corepack enable
        corepack prepare "$PM" --activate
        pnpm -v

    - name: Install dependencies
      shell: bash
      run: |
        node "$GITHUB_WORKSPACE/scripts/assert-install-env.mjs"
        pnpm install --config.optional=true --frozen-lockfile

    - name: Build workspace
      shell: bash
      run: pnpm -r build

    - name: Check release drift before verify
      shell: bash
      run: node "$GITHUB_WORKSPACE/packages/cli/dist/main.js" release sync --check --json --out .playbook/release-plan.json

    - name: Run Playbook verify
      shell: bash
      run: node "$GITHUB_WORKSPACE/packages/cli/dist/main.js" verify ${{ inputs.args }}
