name: Playbook Verify
description: Run Playbook verification in any repository using the published Playbook CLI.

inputs:
  playbook_version:
    description: Version of the published Playbook CLI package to run (for example, latest or 0.1.0).
    required: false
    default: "latest"
  node_version:
    description: Node.js version to use.
    required: false
    default: "22"
  args:
    description: Additional arguments to pass to `playbook verify`.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Run Playbook verify
      shell: bash
      run: npx --yes playbook@${{ inputs.playbook_version }} verify ${{ inputs.args }}
