name: Playbook CI

description: Reusable CI action for deterministic Playbook install and verification.

inputs:
  node-version:
    description: Node.js version to use.
    required: false
    default: "22"
  working-directory:
    description: Working directory to run Playbook CI commands in.
    required: false
    default: "."
  run-smoke:
    description: Whether to run smoke tests.
    required: false
    default: "true"
  install-args:
    description: Additional arguments for pnpm install.
    required: false
    default: "--frozen-lockfile"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup deterministic pnpm with Corepack
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@10.0.0 --activate
        node -v
        pnpm -v

    - name: Install and verify
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NPM_CONFIG_OPTIONAL: "true"
        PNPM_CONFIG_OPTIONAL: "true"
      run: |
        echo "==> Running Playbook CI"
        npm config set registry https://registry.npmjs.org/
        pnpm config set registry https://registry.npmjs.org/
        echo "npm registry: $(npm config get registry)"
        echo "pnpm registry: $(pnpm config get registry)"
        echo "npm userconfig: $(npm config get userconfig)"
        echo "npm globalconfig: $(npm config get globalconfig)"
        node "$GITHUB_WORKSPACE/scripts/assert-install-env.mjs"
        if ! pnpm install --config.optional=true ${{ inputs.install-args }}; then
          echo "Run pnpm -w install --no-frozen-lockfile and commit pnpm-lock.yaml"
          exit 1
        fi
        echo "==> Optional dependency diagnostics"
        echo "pnpm config optional: $(pnpm config get optional)"
        echo "npm config optional: $(npm config get optional)"
        echo "env optional: $(node -p 'process.env.npm_config_optional || process.env.NPM_CONFIG_OPTIONAL || ""')"
        if [[ "$(pnpm config get optional)" != "true" && "$(npm config get optional)" != "true" && "$(node -p 'process.env.npm_config_optional || process.env.NPM_CONFIG_OPTIONAL || ""')" != "true" ]]; then
          echo "ERROR: optionalDependencies appear to be disabled in CI. This can break native optional packages (e.g. rollup/esbuild)."
          exit 1
        fi
        pnpm verify
