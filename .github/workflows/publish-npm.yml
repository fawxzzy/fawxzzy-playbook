name: publish-npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      SKIP_NPM_PUBLISH: ${{ vars.SKIP_NPM_PUBLISH || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: |
          pnpm config set fetch-retries 5
          pnpm config set fetch-retry-factor 2
          pnpm config set fetch-retry-mintimeout 10000
          pnpm config set fetch-retry-maxtimeout 60000
          pnpm config set network-timeout 120000
          pnpm config set registry https://registry.npmjs.org/
          pnpm install --config.optional=true --frozen-lockfile

      - name: Build
        run: pnpm -r --workspace-concurrency=1 build

      - name: Test
        run: pnpm -r test

      - name: Publish @fawxzzy/playbook-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/core
        run: |
          if [ "${SKIP_NPM_PUBLISH}" = "true" ]; then
            echo "SKIP_NPM_PUBLISH=true; skipping npm publish for @fawxzzy/playbook-core."
            exit 0
          fi
          package_name="@fawxzzy/playbook-core"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already published; skipping publish."
            exit 0
          fi
          set +e
          pnpm publish --access public --no-git-checks --provenance
          publish_exit=$?
          set -e
          if [ "$publish_exit" -ne 0 ]; then
            echo "::warning::${package_name}@${package_version} publish failed (exit ${publish_exit}). Fallback tarball upload will continue."
          fi

      - name: Publish @fawxzzy/playbook-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/node
        run: |
          if [ "${SKIP_NPM_PUBLISH}" = "true" ]; then
            echo "SKIP_NPM_PUBLISH=true; skipping npm publish for @fawxzzy/playbook-node."
            exit 0
          fi
          package_name="@fawxzzy/playbook-node"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already published; skipping publish."
            exit 0
          fi
          set +e
          pnpm publish --access public --no-git-checks --provenance
          publish_exit=$?
          set -e
          if [ "$publish_exit" -ne 0 ]; then
            echo "::warning::${package_name}@${package_version} publish failed (exit ${publish_exit}). Fallback tarball upload will continue."
          fi

      - name: Publish @fawxzzy/playbook-engine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/engine
        run: |
          if [ "${SKIP_NPM_PUBLISH}" = "true" ]; then
            echo "SKIP_NPM_PUBLISH=true; skipping npm publish for @fawxzzy/playbook-engine."
            exit 0
          fi
          package_name="@fawxzzy/playbook-engine"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already published; skipping publish."
            exit 0
          fi
          set +e
          pnpm publish --access public --no-git-checks --provenance
          publish_exit=$?
          set -e
          if [ "$publish_exit" -ne 0 ]; then
            echo "::warning::${package_name}@${package_version} publish failed (exit ${publish_exit}). Fallback tarball upload will continue."
          fi

      - name: Publish @fawxzzy/playbook
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/cli
        run: |
          if [ "${SKIP_NPM_PUBLISH}" = "true" ]; then
            echo "SKIP_NPM_PUBLISH=true; skipping npm publish for @fawxzzy/playbook."
            exit 0
          fi
          package_name="@fawxzzy/playbook"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already published; skipping publish."
            exit 0
          fi
          set +e
          pnpm publish --access public --no-git-checks --provenance
          publish_exit=$?
          set -e
          if [ "$publish_exit" -ne 0 ]; then
            echo "::warning::${package_name}@${package_version} publish failed (exit ${publish_exit}). Fallback tarball upload will continue."
          fi

      - name: Publish @fawxzzy/playbook-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/cli-wrapper
        run: |
          if [ "${SKIP_NPM_PUBLISH}" = "true" ]; then
            echo "SKIP_NPM_PUBLISH=true; skipping npm publish for @fawxzzy/playbook-cli."
            exit 0
          fi
          package_name="@fawxzzy/playbook-cli"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already published; skipping publish."
            exit 0
          fi
          set +e
          pnpm publish --access public --no-git-checks --provenance
          publish_exit=$?
          set -e
          if [ "$publish_exit" -ne 0 ]; then
            echo "::warning::${package_name}@${package_version} publish failed (exit ${publish_exit}). Fallback tarball upload will continue."
          fi

      - name: Pack deterministic fallback tarball
        id: fallback_pack
        run: |
          pack_json="$(node scripts/pack-release-fallback-asset.mjs)"
          echo "$pack_json"
          echo "version=$(printf '%s' "$pack_json" | node -pe "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")" >> "$GITHUB_OUTPUT"
          echo "asset_path=$(printf '%s' "$pack_json" | node -pe "JSON.parse(require('fs').readFileSync(0, 'utf8')).assetPath")" >> "$GITHUB_OUTPUT"

      - name: Upload fallback tarball to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.fallback_pack.outputs.asset_path }}
