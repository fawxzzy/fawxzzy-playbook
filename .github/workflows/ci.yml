name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Playbook CI
        uses: ./.github/actions/playbook-ci
        with:
          node-version: "22"
          working-directory: "."
          run-smoke: "true"
