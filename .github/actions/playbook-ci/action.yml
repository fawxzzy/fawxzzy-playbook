name: Playbook CI

description: Reusable CI action for Playbook install, lint, build, test, and smoke checks.

inputs:
  node-version:
    description: Node.js version to use.
    required: false
    default: "22"
  working-directory:
    description: Working directory to run Playbook CI commands in.
    required: false
    default: "."
  run-smoke:
    description: Whether to run smoke tests.
    required: false
    default: "true"
  install-args:
    description: Additional arguments for pnpm install.
    required: false
    default: "--frozen-lockfile"

runs:
  using: composite
  steps:
    - name: Disable Corepack
      shell: bash
      run: corepack disable

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install, lint, build, test, and optional smoke
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NPM_CONFIG_OPTIONAL: "true"
        PNPM_CONFIG_OPTIONAL: "true"
      run: |
        echo "==> Running Playbook CI"
        if ! pnpm install --config.optional=true ${{ inputs.install-args }}; then
          echo "Run pnpm -w install --no-frozen-lockfile and commit pnpm-lock.yaml"
          exit 1
        fi
        echo "==> Optional dependency diagnostics"
        echo "pnpm config optional: $(pnpm config get optional)"
        echo "npm config optional: $(npm config get optional)"
        echo "env optional: $(node -p 'process.env.npm_config_optional || process.env.NPM_CONFIG_OPTIONAL || ""')"
        if [[ "$(pnpm config get optional)" != "true" && "$(npm config get optional)" != "true" && "$(node -p 'process.env.npm_config_optional || process.env.NPM_CONFIG_OPTIONAL || ""')" != "true" ]]; then
          echo "ERROR: optionalDependencies appear to be disabled in CI. This can break native optional packages (e.g. rollup/esbuild)."
          exit 1
        fi
        pnpm lint
        pnpm build
        pnpm test
        node packages/cli/dist/cli.js --help
        if [[ "${{ inputs.run-smoke }}" == "true" ]]; then
          node scripts/smoke-test.mjs
        else
          echo "Skipping smoke test (run-smoke=${{ inputs.run-smoke }})"
        fi
