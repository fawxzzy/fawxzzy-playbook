name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      enable_test_autofix:
        description: "Explicitly allow canonical Playbook test-autofix mutation in CI"
        required: false
        default: false
        type: boolean
      require_clean_worktree_for_autofix:
        description: "Require a clean worktree before CI autofix mutation is allowed"
        required: false
        default: true
        type: boolean
      allow_autofix_retry_override:
        description: "Explicitly bypass CI transport-level retry suppression for the current workflow dispatch only"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Playbook CI composite action
        id: playbook-ci
        uses: ./.github/actions/playbook-ci
        with:
          execution-path: "ci"
          node-version: "22"
          working-directory: "."
          enable-test-autofix: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_test_autofix && 'true' || 'false' }}
          require-clean-worktree-for-autofix: ${{ github.event_name == 'workflow_dispatch' && inputs.require_clean_worktree_for_autofix && 'true' || 'false' }}
          trusted-autofix-events: "workflow_dispatch"
          trusted-autofix-branches: "refs/heads/main"
          protected-branches: "refs/heads/main"
          max-autofix-attempts-per-sha: "1"
          allow-autofix-retry-override: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_autofix_retry_override && 'true' || 'false' }}
          retry-override-labels: "playbook:retry-autofix"
          autofix-confidence-threshold: ${{ vars.PLAYBOOK_AUTOFIX_CONFIDENCE_THRESHOLD || '0.7' }}
          remediation-history-artifact-name: "playbook-remediation-artifacts-ci"
          remediation-history-lookback: "5"

      - name: Upload Playbook remediation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playbook-remediation-artifacts-ci
          if-no-files-found: ignore
          retention-days: 14
          path: |
            .playbook/ci-failure.log
            .playbook/ci-remediation-policy.json
            .playbook/failure-summary.json
            .playbook/failure-summary.md
            .playbook/test-triage.json
            .playbook/test-fix-plan.json
            .playbook/test-autofix-apply.json
            .playbook/test-autofix.json
            .playbook/test-autofix-history.json
            .playbook/remediation-status.json
            .playbook/remediation-comment.md
            .playbook/verify.json
            .playbook/release-plan.json
            .playbook/release-summary.md
            .playbook/release-summary-comment.md
            .playbook/merge-guard-comment.md
            .playbook/ci-summary.md
            .playbook/ci-summary-comment.md

      - name: Post sticky Playbook CI Summary PR comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && hashFiles('.playbook/ci-summary-comment.md') != ''
        uses: actions/github-script@v7
        env:
          PLAYBOOK_COMMENT_MARKER: "<!-- playbook:ci-summary -->"
          PLAYBOOK_COMMENT_FILE: ".playbook/ci-summary-comment.md"
        with:
          script: |
            const fs = require('node:fs');
            const { upsertStickyPrComment } = require('./.github/scripts/upsert-sticky-pr-comment.cjs');
            const body = fs.readFileSync(process.env.PLAYBOOK_COMMENT_FILE, 'utf8').trimEnd();
            const { owner, repo } = context.repo;
            const result = await upsertStickyPrComment({
              github,
              owner,
              repo,
              issue_number: context.issue.number,
              marker: process.env.PLAYBOOK_COMMENT_MARKER,
              body,
            });
            core.info(`${result.action === 'updated' ? 'Updated' : 'Created'} Playbook CI Summary PR comment: ${result.id}`);

      - name: Skip Playbook CI Summary PR comment for fork pull requests
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && hashFiles('.playbook/ci-summary-comment.md') != ''
        run: |
          echo "Skipping Playbook CI Summary sticky comment: pull_request originates from a fork and may not have pull-requests:write permission."

  demo-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Playbook setup/build path for demo validation
        uses: ./.github/actions/playbook-ci
        with:
          execution-path: "demo-validate"
          node-version: "22"
          working-directory: "."
          remediation-history-artifact-name: "playbook-remediation-artifacts-demo-validate"
          remediation-history-lookback: "5"

      - name: Upload Playbook remediation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playbook-remediation-artifacts-demo-validate
          if-no-files-found: ignore
          retention-days: 14
          path: |
            .playbook/ci-failure.log
            .playbook/ci-remediation-policy.json
            .playbook/failure-summary.json
            .playbook/failure-summary.md
            .playbook/test-triage.json
            .playbook/test-fix-plan.json
            .playbook/test-autofix-apply.json
            .playbook/test-autofix.json
            .playbook/test-autofix-history.json
            .playbook/remediation-status.json
            .playbook/remediation-comment.md
            .playbook/verify.json
            .playbook/release-plan.json
            .playbook/release-summary.md
            .playbook/release-summary-comment.md
            .playbook/merge-guard-comment.md
            .playbook/ci-summary.md
            .playbook/ci-summary-comment.md

      - name: Validate playbook-demo compatibility
        run: node scripts/demo-validate.mjs
