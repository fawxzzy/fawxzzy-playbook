name: demo-integration

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: demo-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  demo-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Playbook CI composite action
        uses: ./.github/actions/playbook-ci
        with:
          node-version: "22"
          working-directory: "."
          install-args: "--frozen-lockfile"

      - name: Demo refresh dry-run integration check
        run: node scripts/demo-refresh.mjs --dry-run --feature-id PB-V1-DEMO-REFRESH-001
