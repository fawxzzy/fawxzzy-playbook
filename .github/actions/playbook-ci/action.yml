name: Playbook CI

description: Reusable CI action for deterministic Playbook install and verification.

inputs:
  node-version:
    description: Node.js version to use.
    required: false
    default: "22"
  working-directory:
    description: Working directory to run Playbook CI commands in.
    required: false
    default: "."
  run-smoke:
    description: Whether to run smoke tests.
    required: false
    default: "true"
  install-args:
    description: Additional arguments for pnpm install.
    required: false
    default: "--frozen-lockfile"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        cache: true
        cache_dependency_path: pnpm-lock.yaml

    - name: Runtime versions
      shell: bash
      run: |
        node -v
        pnpm -v

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        node "$GITHUB_WORKSPACE/scripts/assert-install-env.mjs"
        pnpm install ${{ inputs.install-args }}

    - name: Install diagnostics (on failure)
      if: failure()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "Install failed. Diagnostic snapshot:"
        node -v
        corepack --version
        pnpm -v
        pnpm store path --silent
        echo "npm_config_optional=${npm_config_optional:-<unset>}"
        echo "NPM_CONFIG_OPTIONAL=${NPM_CONFIG_OPTIONAL:-<unset>}"
        echo "PNPM_SKIP_OPTIONAL_DEPENDENCIES=${PNPM_SKIP_OPTIONAL_DEPENDENCIES:-<unset>}"

    - name: Verify Rollup native optional package (Linux)
      if: runner.os == 'Linux'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if ! node -e "require.resolve('@rollup/rollup-linux-x64-gnu')"; then
          echo "Rollup native optional package missing. This repository pins @rollup/rollup-linux-x64-gnu via optionalDependencies, and pnpm-lock.yaml should include it. If it is missing, the lockfile is stale and must be regenerated."
          exit 1
        fi

    - name: Lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm lint

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm test

    - name: Smoke (CI)
      if: inputs.run-smoke == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm smoke:ci
