name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Playbook CI composite action
        uses: ./.github/actions/playbook-ci
        with:
          node-version: "22"
          working-directory: "."
