name: maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: maintenance-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  automation-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm via Corepack
        shell: bash
        run: |
          PM="$(node -p "require(process.env.GITHUB_WORKSPACE + '/package.json').packageManager")"
          if [[ -z "$PM" || "$PM" != pnpm@* ]]; then
            echo "Invalid or missing packageManager in package.json (expected pnpm@...). Got: '$PM'"
            exit 1
          fi
          corepack enable
          corepack prepare "$PM" --activate

      - name: Install dependencies
        shell: bash
        run: |
          node scripts/assert-install-env.mjs
          pnpm config set fetch-retries 5
          pnpm config set fetch-retry-factor 2
          pnpm config set fetch-retry-mintimeout 10000
          pnpm config set fetch-retry-maxtimeout 60000
          pnpm config set network-timeout 120000
          pnpm config set registry https://registry.npmjs.org/
          pnpm install --config.optional=true --frozen-lockfile

      - name: Refresh managed docs surfaces
        shell: bash
        run: pnpm agents:update

      - name: Verify managed docs are in sync
        shell: bash
        run: pnpm agents:check

      - name: Run docs audit (maintenance)
        shell: bash
        run: node packages/cli/dist/main.js docs audit --json
