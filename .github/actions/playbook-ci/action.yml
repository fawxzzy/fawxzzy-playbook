name: Playbook CI

description: Reusable CI action for deterministic Playbook install and primary verify gate validation.

inputs:
  node-version:
    description: Node.js version to use.
    required: false
    default: "22"
  working-directory:
    description: Working directory to run Playbook CI commands in.
    required: false
    default: "."
  install-args:
    description: Additional arguments for pnpm install.
    required: false
    default: "--frozen-lockfile"
  enable-test-autofix:
    description: Explicit opt-in flag that allows canonical test-autofix orchestration to run after test failure in CI.
    required: false
    default: "false"
  trusted-autofix-events:
    description: Comma-separated GitHub event names allowed to run CI autofix when explicitly enabled.
    required: false
    default: "workflow_dispatch"
  trusted-autofix-branches:
    description: Comma-separated refs allowed to run CI autofix on push when explicitly enabled.
    required: false
    default: "refs/heads/main"
  require-clean-worktree-for-autofix:
    description: Require a clean worktree before CI autofix mutation is allowed.
    required: false
    default: "true"
  protected-branches:
    description: Comma-separated refs that should run test-autofix in dry-run mode even when remediation is allowed.
    required: false
    default: "refs/heads/main"
  max-autofix-attempts-per-sha:
    description: Maximum CI transport-level autofix attempts allowed for the same commit SHA within one workflow lifecycle.
    required: false
    default: "1"
  allow-autofix-retry-override:
    description: Explicit operator override that may bypass CI transport-level retry suppression without widening runtime trust boundaries.
    required: false
    default: "false"
  retry-override-labels:
    description: Comma-separated pull request labels that act as explicit retry override signals for CI transport-level retry suppression.
    required: false
    default: "playbook:retry-autofix"
  autofix-confidence-threshold:
    description: Deterministic minimum confidence required before test-autofix may mutate.
    required: false
    default: "0.7"
  remediation-history-artifact-name:
    description: Artifact name to hydrate prior canonical test-autofix remediation history from before CI reruns canonical commands.
    required: false
    default: "playbook-remediation-artifacts-ci"
  remediation-history-lookback:
    description: Maximum number of prior remediation artifact archives to inspect when hydrating canonical history.
    required: false
    default: "5"

outputs:
  test-exit-code:
    description: Exit code from the primary pnpm test step.
    value: ${{ steps.run-tests.outputs.test-exit-code }}
  remediation-policy-status:
    description: Policy gate outcome for CI remediation.
    value: ${{ steps.remediation-policy.outputs.status }}
  remediation-policy-allows-mutation:
    description: Whether policy gates allowed canonical CI autofix mutation.
    value: ${{ steps.remediation-policy.outputs.mutation-allowed }}
  remediation-mode:
    description: Whether CI ran test-autofix in apply or dry-run mode.
    value: ${{ steps.remediation-policy.outputs.mode }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup pnpm via Corepack
      shell: bash
      run: |
        PM="$(node -p "require(process.env.GITHUB_WORKSPACE + '/package.json').packageManager")"
        if [[ -z "$PM" || "$PM" != pnpm@* ]]; then
          echo "Invalid or missing packageManager in package.json (expected pnpm@...). Got: '$PM'"
          exit 1
        fi
        corepack enable
        corepack prepare "$PM" --activate
        pnpm -v

    - name: Resolve pnpm store path
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ env.PNPM_STORE_PATH }}
        key: pnpm-store-${{ runner.os }}-node-${{ inputs.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-node-${{ inputs.node-version }}-

    - name: Runtime versions
      shell: bash
      run: |
        node -v
        pnpm -v

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        node "$GITHUB_WORKSPACE/scripts/assert-install-env.mjs"
        pnpm install ${{ inputs.install-args }}

    - name: Install diagnostics (on failure)
      if: failure()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "Install failed. Diagnostic snapshot:"
        node -v
        pnpm -v
        pnpm store path --silent
        echo "npm_config_optional=${npm_config_optional:-<unset>}"
        echo "NPM_CONFIG_OPTIONAL=${NPM_CONFIG_OPTIONAL:-<unset>}"
        echo "PNPM_SKIP_OPTIONAL_DEPENDENCIES=${PNPM_SKIP_OPTIONAL_DEPENDENCIES:-<unset>}"

    - name: Verify Rollup native optional package (Linux)
      if: runner.os == 'Linux'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if ! node -e "require.resolve('@rollup/rollup-linux-x64-gnu')"; then
          echo "Rollup native optional package missing. Lockfile should include it because we pin it in optionalDependencies; if missing, pnpm-lock.yaml is stale or install skipped optional deps."
          exit 1
        fi

    - name: Build workspace packages
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "+ pnpm -r build"
        pnpm -r build

    - name: Run tests and capture deterministic failure log
      id: run-tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mkdir -p .playbook
        log_path=".playbook/ci-failure.log"
        : > "$log_path"
        echo "+ pnpm test"
        set +e
        pnpm test 2>&1 | tee "$log_path"
        test_exit_code=${PIPESTATUS[0]}
        set -e
        echo "test-exit-code=$test_exit_code" >> "$GITHUB_OUTPUT"
        echo "PLAYBOOK_TEST_EXIT_CODE=$test_exit_code" >> "$GITHUB_ENV"
        if [[ "$test_exit_code" -eq 0 ]]; then
          echo "pnpm test succeeded; failure log reserved at $log_path for deterministic CI transport compatibility."
        else
          echo "pnpm test failed; deterministic failure log captured at $log_path"
        fi

    - name: Evaluate CI remediation policy gates
      id: remediation-policy
      if: always()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PLAYBOOK_AUTOFIX_ENABLED: ${{ inputs.enable-test-autofix }}
        PLAYBOOK_TRUSTED_AUTOFIX_EVENTS: ${{ inputs.trusted-autofix-events }}
        PLAYBOOK_TRUSTED_AUTOFIX_BRANCHES: ${{ inputs.trusted-autofix-branches }}
        PLAYBOOK_REQUIRE_CLEAN_WORKTREE: ${{ inputs.require-clean-worktree-for-autofix }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_REF: ${{ github.ref }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PLAYBOOK_PROTECTED_BRANCHES: ${{ inputs.protected-branches }}
        PLAYBOOK_MAX_AUTOFIX_ATTEMPTS_PER_SHA: ${{ inputs.max-autofix-attempts-per-sha }}
        PLAYBOOK_ALLOW_AUTOFIX_RETRY_OVERRIDE: ${{ inputs.allow-autofix-retry-override }}
        PLAYBOOK_RETRY_OVERRIDE_LABELS: ${{ inputs.retry-override-labels }}
        PLAYBOOK_AUTOFIX_CONFIDENCE_THRESHOLD: ${{ inputs.autofix-confidence-threshold }}
        GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        GITHUB_BASE_REF: ${{ github.base_ref }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      run: |
        mkdir -p .playbook
        node "$GITHUB_WORKSPACE/.github/scripts/evaluate-ci-remediation-policy.cjs"
        status=$(node -e "const fs=require('node:fs'); const artifact=JSON.parse(fs.readFileSync('.playbook/ci-remediation-policy.json','utf8')); console.log(artifact.status)")
        mutation_allowed=$(node -e "const fs=require('node:fs'); const artifact=JSON.parse(fs.readFileSync('.playbook/ci-remediation-policy.json','utf8')); console.log(String(artifact.mutation_allowed))")
        mode=$(node -e "const fs=require('node:fs'); const artifact=JSON.parse(fs.readFileSync('.playbook/ci-remediation-policy.json','utf8')); console.log(String(artifact.mode || 'apply'))")
        echo "status=$status" >> "$GITHUB_OUTPUT"
        echo "mutation-allowed=$mutation_allowed" >> "$GITHUB_OUTPUT"
        echo "mode=$mode" >> "$GITHUB_OUTPUT"

    - name: Hydrate prior canonical remediation history
      if: env.PLAYBOOK_TEST_EXIT_CODE != '0' && steps.remediation-policy.outputs.mutation-allowed == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        PLAYBOOK_REMEDIATION_ARTIFACT_NAME: ${{ inputs.remediation-history-artifact-name }}
        PLAYBOOK_REMEDIATION_HISTORY_LOOKBACK: ${{ inputs.remediation-history-lookback }}
      run: |
        echo "+ node $GITHUB_WORKSPACE/.github/scripts/hydrate-remediation-history.cjs --cwd . --out .playbook/test-autofix-history.json"
        node "$GITHUB_WORKSPACE/.github/scripts/hydrate-remediation-history.cjs" --cwd . --out .playbook/test-autofix-history.json

    - name: Run canonical bounded test-autofix
      if: env.PLAYBOOK_TEST_EXIT_CODE != '0' && steps.remediation-policy.outputs.mutation-allowed == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PLAYBOOK_AUTOFIX_CONFIDENCE_THRESHOLD: ${{ inputs.autofix-confidence-threshold }}
      run: |
        EXTRA_ARGS=()
        if [[ "${{ steps.remediation-policy.outputs.mode }}" == "dry_run" ]]; then
          EXTRA_ARGS+=(--dry-run)
        fi
        EXTRA_ARGS+=(--confidence-threshold "$PLAYBOOK_AUTOFIX_CONFIDENCE_THRESHOLD")
        echo "+ pnpm playbook test-autofix --input .playbook/ci-failure.log ${EXTRA_ARGS[*]} --json | tee .playbook/test-autofix.json"
        pnpm playbook test-autofix --input .playbook/ci-failure.log "${EXTRA_ARGS[@]}" --json | tee .playbook/test-autofix.json

    - name: Run canonical remediation-status read model
      if: env.PLAYBOOK_TEST_EXIT_CODE != '0' && steps.remediation-policy.outputs.mutation-allowed == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "+ pnpm playbook remediation-status --json | tee .playbook/remediation-status.json"
        pnpm playbook remediation-status --json | tee .playbook/remediation-status.json

    - name: Log blocked-by-policy CI remediation state
      if: env.PLAYBOOK_TEST_EXIT_CODE != '0' && steps.remediation-policy.outputs.mutation-allowed != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "Playbook CI remediation blocked by policy gates."
        cat .playbook/ci-remediation-policy.json

    - name: Run targeted CLI test filters
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "+ pnpm test:targeted"
        pnpm test:targeted

    - name: Run Playbook verification (primary contract gate)
      id: run-verify
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mkdir -p .playbook
        echo "+ node packages/cli/dist/main.js verify --json | tee .playbook/verify.json"
        set +e
        node packages/cli/dist/main.js verify --json | tee .playbook/verify.json
        verify_exit_code=${PIPESTATUS[0]}
        set -e
        echo "verify-exit-code=$verify_exit_code" >> "$GITHUB_OUTPUT"
        if [[ "$verify_exit_code" -ne 0 ]]; then
          exit "$verify_exit_code"
        fi

    - name: Surface canonical merge-guard summary
      if: always()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        node "$GITHUB_WORKSPACE/.github/scripts/render-verify-merge-guard-summary.cjs" \
          --verify .playbook/verify.json \
          --out .playbook/merge-guard-comment.md

    - name: Validate roadmap contract (deterministic delivery gate)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "+ node scripts/validate-roadmap-contract.mjs --ci --enforce-pr-feature-id"
        node scripts/validate-roadmap-contract.mjs --ci --enforce-pr-feature-id

    - name: Run docs audit (governance drift gate)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "+ node packages/cli/dist/main.js docs audit --ci --json"
        node packages/cli/dist/main.js docs audit --ci --json

    - name: Fail when primary tests failed
      if: always() && steps.run-tests.outputs.test-exit-code != '0'
      shell: bash
      run: |
        echo "Primary pnpm test failed earlier in Playbook CI; preserving failure after remediation reporting."
        exit 1
